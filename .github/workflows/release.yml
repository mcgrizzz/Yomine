name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name for the release (e.g., v0.3.0-beta.1)"
        required: true
        type: string
      build_only:
        description: "Build only without uploading to release"
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      tag_name:
        description: "Tag name for the release"
        required: true
        type: string
      build_only:
        description: "Build only without uploading to release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  TAG_NAME: ${{ github.event.release.tag_name || inputs.tag_name }}

jobs:
  create-checksums:
    needs: [build-tauri]
    runs-on: ubuntu-latest
    if: ${{ !inputs.build_only }}
    
    steps:
      # gh (unlike release-downloader actions) can find draft releases by tag.
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir downloads
          cd downloads
          gh release download "$TAG_NAME" --repo "$GITHUB_REPOSITORY"

      - name: Generate consolidated checksums
        run: |
          cd downloads
          rm -f SHA256SUMS.txt SHA256SUMS-detailed.txt
          sha256sum -- * > ../SHA256SUMS.txt
          echo "Generated checksums:"
          cat ../SHA256SUMS.txt

          cat > ../SHA256SUMS-detailed.txt << 'EOF'
          # SHA256 Checksums for Yomine Release
          #
          # File descriptions:
          # - *.msi / *-setup.exe: Windows installers
          # - *.dmg: macOS universal app (Intel + Apple Silicon)
          # - *.deb / *.rpm / *.AppImage: Linux packages
          # - latest.json / *.sig / *.tar.gz: in-app updater metadata
          
          EOF
          cat ../SHA256SUMS.txt >> ../SHA256SUMS-detailed.txt
        shell: bash

      - name: Upload checksums to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$TAG_NAME" SHA256SUMS.txt SHA256SUMS-detailed.txt \
            --clobber --repo "$GITHUB_REPOSITORY"

  # The release stays a draft while installers build; it goes live only once
  # every asset (installers, latest.json, checksums) is up, so the in-app
  # updater and /releases/latest never see a half-built release. MY_PAT rather
  # than GITHUB_TOKEN so the `published` event still triggers auto-release-notes.
  publish-release:
    needs: [create-checksums]
    runs-on: ubuntu-latest
    if: ${{ !inputs.build_only }}

    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MY_PAT }}
          script: |
            const tag = process.env.TAG_NAME;
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const release = releases.find((r) => r.tag_name === tag);
            if (!release) throw new Error(`No release found for tag ${tag}`);
            if (!release.draft) {
              console.log(`${tag} is already published`);
              return;
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
            });
            console.log(`Published ${tag}: ${release.html_url}`);
  # `tauri-action` runs `beforeBuildCommand` (pnpm build in ui/) itself; we only
  # install the frontend deps first. With a tag it uploads the installers to
  # that release; in build_only mode it just builds and we attach artifacts.
  build-tauri:
    name: ${{ inputs.build_only && 'Build' || 'Release' }} - Tauri ${{ matrix.platform.os-name }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os-name: Windows-x86_64
            runs-on: windows-latest
            args: ""
          - os-name: Linux-x86_64
            runs-on: ubuntu-22.04
            args: ""
          - os-name: macOS-universal
            runs-on: macos-latest
            args: "--target universal-apple-darwin"

    runs-on: ${{ matrix.platform.runs-on }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.os-name == 'macOS-universal' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Linux dependencies
        if: matrix.platform.runs-on == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libxdo-dev libssl-dev libgtk-3-dev patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22.x'
          cache: pnpm
          cache-dependency-path: src-tauri/ui/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: src-tauri/ui

      - name: Build and upload installers
        if: ${{ !inputs.build_only }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater artifact signing; also makes tauri-action generate and
          # upload latest.json for the in-app updater.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.TAG_NAME }}
          # Upload into the draft created by manual-release (create one as a
          # draft if it doesn't exist); publish-release flips it live at the end.
          releaseDraft: true
          args: ${{ matrix.platform.args }}

      - name: Build installers (build-only mode)
        if: ${{ inputs.build_only }}
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.platform.args }}

      - name: Upload installers as artifacts (build-only mode)
        if: ${{ inputs.build_only }}
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.platform.os-name }}
          path: |
            src-tauri/target/**/bundle/**/*.msi
            src-tauri/target/**/bundle/**/*.exe
            src-tauri/target/**/bundle/**/*.dmg
            src-tauri/target/**/bundle/**/*.deb
            src-tauri/target/**/bundle/**/*.rpm
            src-tauri/target/**/bundle/**/*.AppImage
            src-tauri/target/**/bundle/**/*.sig
            target/**/bundle/**/*.msi
            target/**/bundle/**/*.exe
            target/**/bundle/**/*.dmg
            target/**/bundle/**/*.deb
            target/**/bundle/**/*.rpm
            target/**/bundle/**/*.AppImage
            target/**/bundle/**/*.sig
          retention-days: 7
          if-no-files-found: warn
