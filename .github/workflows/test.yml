name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1) Figure out what changed
  filter:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.paths.outputs.code }}
      frontend: ${{ steps.paths.outputs.frontend }}
      workflow: ${{ steps.paths.outputs.workflow }}
      scripts: ${{ steps.paths.outputs.scripts }}
      is_push_to_main: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed files
        id: paths
        uses: dorny/paths-filter@v3.0.2
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'examples/**'
              - 'assets/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'src-tauri/src/**'
              - 'src-tauri/Cargo.toml'
              - 'src-tauri/tauri.conf.json'
              - 'src-tauri/capabilities/**'
            frontend:
              - 'src-tauri/ui/**'
            workflow:
              - '.github/workflows/**/*.yml'
            scripts:
              - '.github/scripts/**/*.js'

  # 2) Lint workflows and JS
  # Run if: workflows/scripts changed OR it's a push to main
  workflow-lint:
    needs: filter
    if: >
      needs.filter.outputs.workflow == 'true' ||
      needs.filter.outputs.scripts == 'true' ||
      needs.filter.outputs.is_push_to_main == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '18.x'

      - name: Lint GitHub Actions workflows
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color

      - name: Check JS syntax in scripts/
        run: |
          find .github/scripts -type f -name '*.js' -print0 2>/dev/null | 
          xargs -0 -n1 node --check || echo "No JS files found"

  # 3) Run Rust tests
  # Run if: code changed OR it's a push to main
  rust-tests:
    needs: filter
    if: >
      needs.filter.outputs.code == 'true' ||
      needs.filter.outputs.is_push_to_main == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_PROFILE_DEV_DEBUG: 0
      RUSTFLAGS: "-D warnings -A deprecated"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install and Cache Linux Dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: |
            libgtk-3-dev
            libxcb-render0-dev
            libxcb-shape0-dev
            libxcb-xfixes0-dev
            libxkbcommon-dev
            libssl-dev
            libwebkit2gtk-4.1-dev
            libayatana-appindicator3-dev
            librsvg2-dev
            libxdo-dev
          version: 1.0

      # The segmentation suite (tests/segmentation.rs) runs the real UniDic
      # tokenizer; cache the auto-downloaded model so only the first run pays.
      - name: Cache UniDic tokenizer model
        uses: actions/cache@v4
        with:
          path: ~/.local/share/yomine/dictionaries/tokenizer
          key: unidic-tokenizer-v1

      - name: Setup test environment
        run: |
          mkdir -p dictionaries/frequency dictionaries/tokenizer
          # generate_context! needs the frontendDist dir to exist even for check.
          mkdir -p src-tauri/ui/build
          echo "CI_ENVIRONMENT=true" >> "$GITHUB_ENV"
          # With the model cached/downloadable, a silent skip of the
          # segmentation fixtures is a CI bug — fail instead.
          echo "YOMINE_REQUIRE_UNIDIC=1" >> "$GITHUB_ENV"

      - name: Check formatting
        run: cargo +nightly fmt -- --check

      - name: Run engine tests (egui feature on)
        run: |
          cargo test -p yomine --verbose -- \
            --skip segmentation::rule_matcher_tests::tests::inspect_tokens

      - name: Check engine without egui (the Tauri configuration)
        run: cargo check -p yomine --no-default-features

      - name: Check Tauri app
        run: cargo check -p yomine-tauri

  # 4) Frontend type/lint check (svelte-check)
  # Run if: frontend changed OR it's a push to main
  svelte-check:
    needs: filter
    if: >
      needs.filter.outputs.frontend == 'true' ||
      needs.filter.outputs.is_push_to_main == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri/ui
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22.x'
          cache: pnpm
          cache-dependency-path: src-tauri/ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: svelte-check
        run: pnpm run check

  # 5) Inform when Rust tests are skipped (only in PRs)
  # Only run if: no code changed AND it's NOT a push to main
  rust-skipped:
    needs: filter
    if: >
      needs.filter.outputs.code == 'false' &&
      needs.filter.outputs.is_push_to_main == 'false'
    runs-on: ubuntu-latest
    steps:
      - run: echo "🔍 No Rust sources changed; tests skipped (PR only behavior)."